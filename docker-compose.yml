services:
  db:
    image: pgvector/pgvector:pg17
    container_name: ragout-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ragout
      POSTGRES_PASSWORD: ragout
      POSTGRES_DB: ragout
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
